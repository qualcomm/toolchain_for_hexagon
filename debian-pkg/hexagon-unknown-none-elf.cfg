# Clang configuration file for Hexagon baremetal with picolibc
#
# Auto-discovered when --target=hexagon-unknown-none-elf is used,
# provided this file resides in the same directory as the clang binary
# (e.g., /usr/lib/llvm-21/bin/).
#
# Default architecture: v68.  For other architectures, also pass:
#   -mcpu=hexagonvXX \
#   -L/usr/hexagon-unknown-none-elf/lib/vXX/G0 \
#   -Wl,-T/usr/hexagon-unknown-none-elf/lib/vXX/G0/picolibc.ld
#
# Depends on: picolibc-hexagon-cross,
#             libclang-rt-21-builtins-hexagon-baremetal

# -- Compile flags --
-G0
-fno-pic
-fno-PIE
-ffreestanding
-fuse-init-array
-nostdlibinc
-isystem /usr/hexagon-unknown-none-elf/include

# -- Link flags --
-nostdlib
--ld-path=<CFGDIR>/ld.lld
-L/usr/hexagon-unknown-none-elf/lib/v68/G0
-L/usr/hexagon-unknown-none-elf/lib/hexagon-unknown-none-elf
-Wl,-T/usr/hexagon-unknown-none-elf/lib/v68/G0/picolibc.ld
/usr/hexagon-unknown-none-elf/lib/v68/G0/crt0-semihost.o

# -- Libraries ($ prefix places these after all user inputs) --
$-Wl,--start-group
$-lc
$-lm
$-lsemihost
$-lclang_rt.builtins
$-Wl,--end-group
