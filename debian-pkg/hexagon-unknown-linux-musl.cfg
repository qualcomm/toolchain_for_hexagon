# Clang configuration file for Hexagon Linux (musl) cross-compilation
#
# Auto-discovered when --target=hexagon-unknown-linux-musl is used,
# provided this file resides in the same directory as the clang binary
# (e.g., /usr/lib/llvm-21/bin/).
#
# Depends on: linux-libc-dev-hexagon-cross, musl-dev-hexagon-cross,
#             libclang-rt-21-builtins-hexagon-cross

--sysroot=/usr/hexagon-unknown-linux-musl
--ld-path=<CFGDIR>/ld.lld
